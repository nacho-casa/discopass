syntax = "proto3";

package pb;

option go_package = "discopass/pb";

// ==========================================
// SERVICIOS
// ==========================================

service BrokerService {
  rpc RegisterEntity(RegisterRequest) returns (RegisterResponse);
  rpc PublishEvent(Event) returns (PublishResponse);
  rpc GetAvailableEvents(EmptyRequest) returns (EventList);
  rpc BuyTicket(BuyRequest) returns (BuyResponse);
  // NUEVO: Recuperación de historial para consumidores (Viñeta 8)
  rpc GetUserHistory(HistoryRequest) returns (HistoryResponse);
}

service DatabaseService {
  rpc WriteData(DBWriteRequest) returns (DBWriteResponse);
  rpc SyncData(SyncRequest) returns (SyncResponse);
  // NUEVO: Lecturas distribuidas para cumplir consenso R=2
  rpc ReadEvents(EmptyRequest) returns (EventList);
  rpc ReadHistory(HistoryRequest) returns (HistoryResponse);
}

service BankService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
}

// ==========================================
// MENSAJES
// ==========================================

message RegisterRequest {
  string entity_id = 1;
  string entity_type = 2; 
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message Event {
  string evento_id = 1;
  string discoteca = 2;
  string nombre_evento = 3;
  string categoria = 4;
  string comuna = 5;
  int32 precio = 6;
  int32 stock = 7;
  string fecha_evento = 8;
  string fecha_publicacion = 9;
}

message PublishResponse {
  bool accepted = 1;
  string message = 2;
}

message EmptyRequest {}

message EventList {
  repeated Event events = 1;
}

message BuyRequest {
  string usuario_id = 1;
  string evento_id = 2;
  string medio_pago = 3; 
}

message BuyResponse {
  bool success = 1;
  string ticket_id = 2;
  string message = 3;
}

message PaymentRequest {
  string usuario_id = 1;
  int32 monto = 2;
  string medio_pago = 3;
}

message PaymentResponse {
  bool approved = 1;
}

message DBWriteRequest {
  string type = 1; 
  bytes payload = 2; 
}

message DBWriteResponse {
  bool success = 1;
}

message SyncRequest {
  string requestor_id = 1; 
}

message SyncResponse {
  map<string, bytes> data = 1; 
}

// NUEVO: Mensajes para el Historial
message HistoryRequest {
  string usuario_id = 1;
}

message TicketInfo {
  string ticket_id = 1;
  string evento_id = 2;
  string nombre_evento = 3;
  string fecha_compra = 4;
}

message HistoryResponse {
  repeated TicketInfo tickets = 1;
}